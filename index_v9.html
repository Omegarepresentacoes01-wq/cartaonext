    min-height: 100dvh;
    background: #05071a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
  }

  /* ── Starfield ── */
  #stars-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 1;
    width: min(420px, 95vw);
    background: linear-gradient(160deg, #0d1235 0%, #050919 100%);
    border: 1px solid rgba(255, 120, 0, .25);
    border-radius: 28px;
    padding: 36px 24px 32px;
    text-align: center;
    box-shadow: 0 0 60px rgba(255, 90, 0, .12), 0 0 120px rgba(0,0,0,.6);
    overflow: hidden;
  }

  /* corner glows */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 90px; height: 90px;
    pointer-events: none;
    opacity: .35;
  }
  .card::before { top: -22px; left: -22px; background: radial-gradient(circle, #ff6a00 0%, transparent 70%); }
  .card::after  { bottom: -22px; right: -22px; background: radial-gradient(circle, #ff6a00 0%, transparent 70%); }

  /* ── Logo ── */
  .logo-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    margin-bottom: 20px;
  }
  .logo-name {
    font-size: clamp(1.75rem, 7vw, 2.1rem);
    font-weight: 900;
    letter-spacing: 1.5px;
    white-space: nowrap;
  }
  .logo-name .white  { color: #fff; }
  .logo-name .orange { color: #ff6a00; }
  .eco-label {
    font-size: .7rem;
    letter-spacing: 7px;
    color: rgba(255,255,255,.4);
    text-transform: uppercase;
  }

  /* ── Avatar — sem círculo, sem animação ── */
  .avatar-wrap {
    margin: 0 auto 26px;
    width: min(360px, 92vw);
  }
  .avatar-img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
  }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .btn {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 14px 26px;
    border: none;
    border-radius: 14px;
    font-size: .93rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .18s, box-shadow .18s;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.95); }

  .btn-whatsapp {
    background: linear-gradient(135deg, #25d366, #128c7e);
    color: #fff;
    box-shadow: 0 4px 20px rgba(37,211,102,.35);
  }
  .btn-whatsapp:hover { box-shadow: 0 6px 28px rgba(37,211,102,.55); transform: translateY(-2px); }

  .btn-site {
    background: linear-gradient(135deg, #ff6a00, #ee4b00);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,106,0,.35);
  }
  .btn-site:hover { box-shadow: 0 6px 28px rgba(255,106,0,.55); transform: translateY(-2px); }

  .btn svg { flex-shrink: 0; }

  /* ── Dados button ── */
  .btn-dados {
    display: block;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #3a1c8a, #5e35c9);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: .92rem;
    font-weight: 700;
    letter-spacing: .5px;
    cursor: pointer;
    transition: transform .18s, box-shadow .18s;
    box-shadow: 0 4px 20px rgba(94,53,201,.4);
  }
  .btn-dados:hover { box-shadow: 0 6px 28px rgba(94,53,201,.6); transform: translateY(-2px); }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.72);
    backdrop-filter: blur(4px);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: linear-gradient(160deg, #0d1235, #050919);
    border: 1px solid rgba(255,120,0,.3);
    border-radius: 22px;
    padding: 32px 28px 28px;
    width: min(400px, 92vw);
    position: relative;
    animation: modalIn .3s ease;
    box-shadow: 0 0 60px rgba(255,90,0,.15);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(.88) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-close {
    position: absolute;
    top: 14px; right: 18px;
    background: none; border: none;
    color: rgba(255,255,255,.45);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: #ff6a00; }
  .modal h2 {
    color: #ff6a00;
    font-size: 1.05rem;
    letter-spacing: 1px;
    margin-bottom: 22px;
    text-transform: uppercase;
  }
  .data-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 16px;
  }
  .data-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(255,106,0,.14);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .data-info { flex: 1; }
  .data-label {
    font-size: .67rem;
    color: rgba(255,255,255,.38);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .data-value {
    font-size: .9rem;
    color: #fff;
    font-weight: 500;
    word-break: break-word;
  }
  .copy-btn {
    background: none;
    border: 1px solid rgba(255,106,0,.3);
    color: rgba(255,255,255,.45);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: .72rem;
    cursor: pointer;
    margin-top: 5px;
    transition: all .2s;
  }
  .copy-btn:hover { background: rgba(255,106,0,.14); color: #ff6a00; border-color: #ff6a00; }
  .copy-btn.copied { background: rgba(0,200,83,.14); color: #00c853; border-color: #00c853; }
</style>
</head>

      da: (Math.random() * .007 + .003) * (Math.random() < .5 ? 1 : -1)
    }));
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    stars.forEach(s => {
      s.a = Math.max(.05, Math.min(1, s.a + s.da));
      if (s.a <= .05 || s.a >= 1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', () => { resize(); initStars(); });
  resize(); initStars(); draw();
})();

/* ── Copy helper ── */
function copyField(id, btn) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2200);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalDados').classList.remove('open');
});
</script>
</body>
