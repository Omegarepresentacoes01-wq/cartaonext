<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Nexttech Eco-System</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{
      height:100%;width:100%;
      font-family:'Montserrat',sans-serif;
      background:#04081a;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;overflow:hidden;
    }
    #stars-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
    #stars-bg span{
      position:absolute;border-radius:50%;background:#fff;
      animation:twinkle var(--d,3s) var(--dl,0s) infinite ease-in-out;opacity:0;
    }
    @keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--o,.7)}}

    .card-wrap{position:relative;z-index:1;width:100%;max-width:390px;padding:12px}

    .card{
      position:relative;width:100%;border-radius:30px;overflow:hidden;
      box-shadow:0 0 0 1.5px rgba(255,140,0,.28),0 0 60px rgba(255,80,0,.18),0 40px 100px rgba(0,0,0,.85);
      min-height:640px;display:flex;flex-direction:column;align-items:center;
    }

    /* overlay escurece e mantém legibilidade */
    .card-overlay{
      position:absolute;inset:0;z-index:1;
      background:
        linear-gradient(180deg,
          rgba(4,8,26,.60) 0%,
          rgba(4,8,26,.05) 28%,
          rgba(4,8,26,.05) 58%,
          rgba(4,8,26,.72) 80%,
          rgba(4,8,26,.97) 100%
        ),
        radial-gradient(ellipse 80% 50% at 50% 50%,rgba(255,100,0,.08) 0%,transparent 70%);
    }

    .card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2.5px;
      background:linear-gradient(90deg,transparent,#ff8c00,#ffb347,#ff8c00,transparent);
      z-index:10;animation:borderGlow 3s ease-in-out infinite;
    }
    @keyframes borderGlow{0%,100%{opacity:.5}50%{opacity:1}}

    .corner{position:absolute;width:22px;height:22px;z-index:10}
    .c-tl{top:14px;left:14px;border-top:2px solid #ff8c00;border-left:2px solid #ff8c00;border-radius:5px 0 0 0}
    .c-tr{top:14px;right:14px;border-top:2px solid #ff8c00;border-right:2px solid #ff8c00;border-radius:0 5px 0 0}
    .c-bl{bottom:14px;left:14px;border-bottom:2px solid rgba(255,140,0,.45);border-left:2px solid rgba(255,140,0,.45);border-radius:0 0 0 5px}
    .c-br{bottom:14px;right:14px;border-bottom:2px solid rgba(255,140,0,.45);border-right:2px solid rgba(255,140,0,.45);border-radius:0 0 5px 0}

    .scan{
      position:absolute;left:0;right:0;height:1.5px;
      background:linear-gradient(90deg,transparent,rgba(255,140,0,.2),transparent);
      animation:scan 6s linear infinite;z-index:9;pointer-events:none;
    }
    @keyframes scan{0%{top:0%}100%{top:100%}}

    .card-content{
      position:relative;z-index:5;width:100%;
      display:flex;flex-direction:column;align-items:center;
      padding:48px 28px 32px;flex:1;
    }

    /* LOGO TOPO */
    .logo-block{text-align:center;padding-top:4px}
    .logo-text{
      font-size:50px;font-weight:900;letter-spacing:-1.5px;line-height:1;
      text-shadow:0 0 35px rgba(255,140,0,.55),0 2px 10px rgba(0,0,0,.95);
    }
    .logo-text .next{color:#ffffff}
    .logo-text .tech{color:#ff8c00}
    .tagline{
      font-size:12px;font-weight:600;color:rgba(255,255,255,.7);
      letter-spacing:5px;text-transform:uppercase;margin-top:5px;
      text-shadow:0 1px 8px rgba(0,0,0,.9);
    }
    .divider-line{
      width:70px;height:1.5px;
      background:linear-gradient(90deg,transparent,#ff8c00,transparent);
      margin:10px auto 0;border-radius:2px;
    }

    /* espaçador — faz o avatar aparecer no centro */
    .spacer{flex:1}

    /* BLOCO INFERIOR */
    .bottom-block{width:100%;display:flex;flex-direction:column;align-items:center;gap:14px}

    /* BOTÕES */
    .buttons{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
    .btn{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:9px;padding:16px 10px;border-radius:18px;border:none;cursor:pointer;
      text-decoration:none;font-family:'Montserrat',sans-serif;font-weight:700;
      transition:transform .18s ease,box-shadow .18s ease;
      position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;
    }
    .btn:active{transform:scale(.95)!important}

    .btn-wa{
      background:linear-gradient(145deg,rgba(10,40,20,.96),rgba(8,30,15,.99));
      border:1px solid rgba(37,211,102,.4);color:#25d366;
      box-shadow:0 4px 20px rgba(37,211,102,.22),inset 0 1px 0 rgba(37,211,102,.1);
      backdrop-filter:blur(14px);
    }
    .btn-wa:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(37,211,102,.38)}

    .btn-web{
      background:linear-gradient(145deg,rgba(15,25,55,.96),rgba(8,15,40,.99));
      border:1px solid rgba(255,140,0,.4);color:#ff8c00;
      box-shadow:0 4px 20px rgba(255,140,0,.22),inset 0 1px 0 rgba(255,140,0,.1);
      backdrop-filter:blur(14px);
    }
    .btn-web:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(255,140,0,.38)}

    .btn-icon-wrap{
      width:50px;height:50px;border-radius:15px;
      display:flex;align-items:center;justify-content:center;
    }
    .btn-wa .btn-icon-wrap{background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.25)}
    .btn-web .btn-icon-wrap{background:rgba(255,140,0,.12);border:1px solid rgba(255,140,0,.25)}
    .btn-icon-wrap svg{width:28px;height:28px}
    .btn-label{font-size:13px;letter-spacing:.5px}

    /* SMART + CNPJ */
    .smart-cnpj{text-align:center;padding-bottom:4px}
    .smart-label{
      font-size:10px;font-weight:700;color:rgba(255,255,255,.5);
      letter-spacing:4px;text-transform:uppercase;margin-bottom:3px;
    }
    .cnpj-value{
      font-size:15px;font-weight:700;color:rgba(255,255,255,.82);
      letter-spacing:1px;text-shadow:0 1px 8px rgba(0,0,0,.9);
    }

    /* PARTÍCULAS HEX */
    .hex{
      position:absolute;color:rgba(255,140,0,.28);font-size:var(--sz,14px);
      z-index:6;pointer-events:none;
      animation:hexUp var(--t,6s) var(--dl,0s) infinite ease-in-out;opacity:0;
    }
    @keyframes hexUp{
      0%{opacity:0;transform:translateY(0) rotate(0deg)}
      20%{opacity:1}80%{opacity:.5}
      100%{opacity:0;transform:translateY(-90px) rotate(180deg)}
    }

    /* RIPPLE */
    .ripple{
      position:absolute;border-radius:50%;
      background:rgba(255,255,255,.22);
      transform:scale(0);animation:rpl .6s linear forwards;pointer-events:none;
    }
    @keyframes rpl{to{transform:scale(4);opacity:0}}
  </style>

            <span class="btn-label">Website</span>
          </a>
        </div>

        <div class="smart-cnpj">
          <div class="smart-label">SMART</div>
          <div class="cnpj-value">45.784.825/0001-82</div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
const sb=document.getElementById('stars-bg');
for(let i=0;i<140;i++){
  const s=document.createElement('span');
  const sz=(Math.random()*2.2+.4).toFixed(1);
  s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*100).toFixed(2)+'%;left:'+(Math.random()*100).toFixed(2)+'%;--d:'+(Math.random()*4+2).toFixed(1)+'s;--dl:'+(Math.random()*6).toFixed(2)+'s;--o:'+(Math.random()*.7+.15).toFixed(2);
  sb.appendChild(s);
}
function addRipple(e,el){
  const r=document.createElement('span');
  r.classList.add('ripple');
  const rc=el.getBoundingClientRect();
  const sz=Math.max(rc.width,rc.height);
  r.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(e.clientX-rc.left-sz/2)+'px;top:'+(e.clientY-rc.top-sz/2)+'px';
  el.appendChild(r);
  setTimeout(()=>r.remove(),700);
}
const card=document.getElementById('mainCard');
card.addEventListener('mousemove',e=>{
  const rc=card.getBoundingClientRect();
  const x=(e.clientX-rc.left)/rc.width-.5;
  const y=(e.clientY-rc.top)/rc.height-.5;
  card.style.transition='transform .1s ease';
  card.style.transform='perspective(1000px) rotateY('+x*9+'deg) rotateX('+(-y*7)+'deg) scale(1.015)';
});
card.addEventListener('mouseleave',()=>{
  card.style.transition='transform .5s ease';
  card.style.transform='perspective(1000px) rotateY(0deg) rotateX(0deg) scale(1)';
});
</script>
</body>
</html>
